<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Regression Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        h1 {
            color: #58a6ff;
            border-bottom: 1px solid #30363d;
            padding-bottom: 12px;
        }
        .chart {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .chart img {
            width: 100%;
            border-radius: 4px;
        }
        .footer {
            text-align: center;
            color: #484f58;
            font-size: 12px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <h1>Camera Regression Dashboard</h1>
    <div class="chart">
        <img src="jpeg_size_bytes.png" alt="Jpeg Size Bytes">
    </div>
    <div class="chart">
        <img src="jpeg_width.png" alt="Jpeg Width">
    </div>
    <div class="chart">
        <img src="jpeg_height.png" alt="Jpeg Height">
    </div>
    <div class="chart">
        <img src="exif_iso.png" alt="Exif Iso">
    </div>
    <div class="chart">
        <img src="exif_exposure_time.png" alt="Exif Exposure Time">
    </div>
    <div class="chart">
        <img src="laplacian_variance.png" alt="Laplacian Variance">
    </div>
    <div class="footer">
        Generated by CameraHarness regression pipeline
    </div>
</body>
</html>
